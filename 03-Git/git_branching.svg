<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 480" font-family="'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif">
  <text x="410" y="35" text-anchor="middle" font-size="20" font-weight="bold" fill="#2C3E50">Git 分支模型</text>
  <line x1="200" y1="45" x2="620" y2="45" stroke="#4A90D9" stroke-width="2" opacity="0.4"/>

  <!-- === 时间轴纵线 === -->
  <line x1="130" y1="80" x2="130" y2="420" stroke="#CCC" stroke-width="1" stroke-dasharray="4,4"/>
  <text x="130" y="75" text-anchor="middle" font-size="11" fill="#999">时间</text>

  <!-- main 分支 -->
  <line x1="130" y1="100" x2="700" y2="100" stroke="#2196F3" stroke-width="3"/>
  <rect x="130" y="87" width="80" height="26" rx="13" fill="#2196F3"/>
  <text x="170" y="105" text-anchor="middle" font-size="12" font-weight="bold" fill="#fff">main</text>

  <!-- main commits -->
  <circle cx="200" cy="100" r="6" fill="#1565C0"/>
  <circle cx="310" cy="100" r="6" fill="#1565C0"/>
  <circle cx="450" cy="100" r="6" fill="#1565C0"/>
  <circle cx="560" cy="100" r="6" fill="#1565C0"/>
  <circle cx="700" cy="100" r="6" fill="#1565C0"/>

  <!-- develop 分支 -->
  <line x1="310" y1="102" x2="700" y2="160" stroke="#4CAF50" stroke-width="3"/>
  <rect x="300" y="155" width="95" height="26" rx="13" fill="#4CAF50"/>
  <text x="348" y="173" text-anchor="middle" font-size="12" font-weight="bold" fill="#fff">develop</text>
  <circle cx="380" cy="105" r="5" fill="#2E7D32"/>
  <circle cx="460" cy="115" r="5" fill="#2E7D32"/>
  <circle cx="550" cy="130" r="5" fill="#2E7D32"/>
  <circle cx="630" cy="148" r="5" fill="#2E7D32"/>
  <circle cx="700" cy="160" r="5" fill="#2E7D32"/>

  <!-- feature 分支 -->
  <line x1="380" y1="107" x2="460" y2="296" stroke="#FF9800" stroke-width="2.5"/>
  <rect x="370" y="288" width="85" height="26" rx="13" fill="#FF9800"/>
  <text x="413" y="306" text-anchor="middle" font-size="11" font-weight="bold" fill="#fff">feature/xxx</text>
  <circle cx="400" cy="140" r="4" fill="#E65100"/>
  <circle cx="420" cy="180" r="4" fill="#E65100"/>
  <circle cx="440" cy="220" r="4" fill="#E65100"/>
  <rect x="438" y="248" width="18" height="18" rx="4" fill="#E65100"/>
  <text x="447" y="261" text-anchor="middle" font-size="10" font-weight="bold" fill="#fff">M</text>

  <!-- 另一个 feature 分支 -->
  <line x1="460" y1="117" x2="610" y2="310" stroke="#9C27B0" stroke-width="2.5"/>
  <rect x="550" y="302" width="85" height="26" rx="13" fill="#9C27B0"/>
  <text x="593" y="320" text-anchor="middle" font-size="11" font-weight="bold" fill="#fff">feature/y</text>
  <circle cx="490" cy="150" r="4" fill="#6A1B9A"/>
  <circle cx="520" cy="195" r="4" fill="#6A1B9A"/>
  <circle cx="550" cy="240" r="4" fill="#6A1B9A"/>
  <circle cx="585" cy="285" r="4" fill="#6A1B9A"/>

  <!-- hotfix 分支 -->
  <line x1="450" y1="102" x2="280" y2="380" stroke="#F44336" stroke-width="2.5"/>
  <rect x="230" y="372" width="80" height="26" rx="13" fill="#F44336"/>
  <text x="270" y="390" text-anchor="middle" font-size="11" font-weight="bold" fill="#fff">hotfix</text>
  <circle cx="400" cy="150" r="4" fill="#C62828"/>
  <circle cx="350" cy="210" r="4" fill="#C62828"/>
  <circle cx="310" cy="270" r="4" fill="#C62828"/>
  <circle cx="280" cy="340" r="4" fill="#C62828"/>

  <!-- 合并标记 -->
  <text x="447" y="273" font-size="10" fill="#E65100">merge</text>
  <text x="490" y="134" font-size="10" fill="#2E7D32">创建分支</text>

  <!-- 标签 -->
  <rect x="550" y="82" width="50" height="18" rx="3" fill="#FFD600"/>
  <text x="575" y="95" text-anchor="middle" font-size="10" font-weight="bold" fill="#333">v1.0</text>
  <rect x="700" y="82" width="50" height="18" rx="3" fill="#FFD600"/>
  <text x="725" y="95" text-anchor="middle" font-size="10" font-weight="bold" fill="#333">v2.0</text>

  <!-- 图例 -->
  <rect x="20" y="445" width="750" height="30" rx="6" fill="#F5F5F5" stroke="#DDD" stroke-width="1"/>
  <line x1="35" y1="462" x2="75" y2="462" stroke="#2196F3" stroke-width="3"/>
  <text x="80" y="466" font-size="11" fill="#555">main</text>
  <line x1="135" y1="462" x2="175" y2="462" stroke="#4CAF50" stroke-width="3"/>
  <text x="180" y="466" font-size="11" fill="#555">develop</text>
  <line x1="255" y1="462" x2="295" y2="462" stroke="#FF9800" stroke-width="2.5"/>
  <text x="300" y="466" font-size="11" fill="#555">feature</text>
  <line x1="370" y1="462" x2="410" y2="462" stroke="#F44336" stroke-width="2.5"/>
  <text x="415" y="466" font-size="11" fill="#555">hotfix</text>
  <rect x="490" y="455" width="14" height="14" rx="3" fill="#FFD600"/>
  <text x="510" y="466" font-size="11" fill="#555">Tag 标签</text>
  <rect x="575" y="455" width="14" height="14" rx="2" fill="#E65100"/>
  <text x="595" y="466" font-size="11" fill="#555">Merge 合并提交</text>
</svg>
