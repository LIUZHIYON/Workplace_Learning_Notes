<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 620 620" font-family="'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif">
  <defs>
    <marker id="arrow-cycle" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#E65100"/>
    </marker>
  </defs>

  <text x="310" y="38" text-anchor="middle" font-size="20" font-weight="bold" fill="#2C3E50">ReAct 循环：推理 + 行动</text>
  <line x1="120" y1="48" x2="500" y2="48" stroke="#E65100" stroke-width="2" opacity="0.4"/>

  <!-- 循环箭头 - 使用路径 -->
  <!-- 顶部思考 -->
  <rect x="160" y="80" width="300" height="65" rx="12" ry="12" fill="#FFF3E0" stroke="#FF9800" stroke-width="2"/>
  <text x="310" y="108" text-anchor="middle" font-size="15" font-weight="bold" fill="#E65100">🤔 Thought (思考)</text>
  <text x="310" y="130" text-anchor="middle" font-size="12" fill="#6D4C41">LLM 分析当前状态，决定下一步做什么</text>

  <!-- 箭头 思考→行动 -->
  <line x1="310" y1="145" x2="310" y2="198" stroke="#FF9800" stroke-width="2" marker-end="url(#arrow-cycle)"/>

  <!-- 行动 -->
  <rect x="160" y="200" width="300" height="65" rx="12" ry="12" fill="#E3F2FD" stroke="#2196F3" stroke-width="2"/>
  <text x="310" y="228" text-anchor="middle" font-size="15" font-weight="bold" fill="#1565C0">⚡ Action (行动)</text>
  <text x="310" y="250" text-anchor="middle" font-size="12" fill="#37474F">调用工具 / 执行函数 / 查询信息</text>

  <!-- 箭头 行动→观察 -->
  <line x1="310" y1="265" x2="310" y2="318" stroke="#2196F3" stroke-width="2" marker-end="url(#arrow-cycle)"/>

  <!-- 观察 -->
  <rect x="160" y="320" width="300" height="65" rx="12" ry="12" fill="#E8F5E9" stroke="#4CAF50" stroke-width="2"/>
  <text x="310" y="348" text-anchor="middle" font-size="15" font-weight="bold" fill="#2E7D32">👁️ Observation (观察)</text>
  <text x="310" y="370" text-anchor="middle" font-size="12" fill="#388E3C">获取环境反馈 / 工具返回结果</text>

  <!-- 循环回箭头 观察→思考 -->
  <path d="M 460 352 Q 560 352 560 200 Q 560 112 460 112" fill="none" stroke="#E65100" stroke-width="2" stroke-dasharray="8,4" marker-end="url(#arrow-cycle)"/>
  <text x="540" y="240" text-anchor="middle" font-size="11" fill="#E65100" transform="rotate(-90, 540, 240)">未完成则继续循环</text>

  <!-- 底部终止 -->
  <rect x="210" y="445" width="200" height="50" rx="25" ry="25" fill="#FCE4EC" stroke="#E91E63" stroke-width="2"/>
  <text x="310" y="475" text-anchor="middle" font-size="14" font-weight="bold" fill="#C62828">✅ 最终答案</text>

  <line x1="310" y1="385" x2="310" y2="445" stroke="#E91E63" stroke-width="2" marker-end="url(#arrow-cycle)"/>

  <!-- 标注 -->
  <text x="310" y="530" text-anchor="middle" font-size="12" fill="#888">ReAct = Reason + Act，来自 Google 论文</text>
  <text x="310" y="548" text-anchor="middle" font-size="12" fill="#888">让 LLM 在思考-行动-观察之间循环，直到完成任务</text>

  <!-- 示例 -->
  <rect x="80" y="565" width="460" height="40" rx="8" ry="8" fill="#F5F5F5" stroke="#CCC" stroke-width="1"/>
  <text x="310" y="582" text-anchor="middle" font-size="11" fill="#666">示例：用户问"上海天气" → 思考需要查天气 → 调用天气API → 观察返回数据 → 回答</text>
</svg>
