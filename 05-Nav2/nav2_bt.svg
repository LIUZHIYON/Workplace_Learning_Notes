<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 500" font-family="'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#555"/>
    </marker>
  </defs>
  <text x="360" y="35" text-anchor="middle" font-size="18" font-weight="bold" fill="#2C3E50">Nav2 导航行为树 (NavigateRecovery 为例)</text>
  <line x1="120" y1="45" x2="600" y2="45" stroke="#E65100" stroke-width="2" opacity="0.4"/>

  <!-- === 根节点 Fallback === -->
  <rect x="280" y="65" width="160" height="40" rx="8" ry="8" fill="#FCE4EC" stroke="#E91E63" stroke-width="2"/>
  <text x="360" y="90" text-anchor="middle" font-size="13" font-weight="bold" fill="#C62828">❓ Fallback (?)</text>
  <line x1="360" y1="105" x2="360" y2="120" stroke="#E91E63" stroke-width="2"/>

  <!-- === 第一子节点 === -->
  <rect x="130" y="125" width="160" height="50" rx="10" ry="10" fill="#FFF3E0" stroke="#FF9800" stroke-width="2"/>
  <text x="210" y="148" text-anchor="middle" font-size="13" font-weight="bold" fill="#E65100">▶️ Sequence (→)</text>
  <text x="210" y="166" text-anchor="middle" font-size="10" fill="#6D4C41">正常导航流程</text>

  <line x1="210" y1="175" x2="210" y2="190" stroke="#FF9800" stroke-width="1.5"/>
  <line x1="160" y1="190" x2="260" y2="190" stroke="#FF9800" stroke-width="1"/>

  <!-- Sequence 子项 -->
  <rect x="100" y="195" width="120" height="35" rx="6" ry="6" fill="#E8F5E9" stroke="#4CAF50" stroke-width="1.5"/>
  <text x="160" y="217" text-anchor="middle" font-size="11" fill="#2E7D32">ComputePathToPose</text>

  <rect x="240" y="195" width="120" height="35" rx="6" ry="6" fill="#E8F5E9" stroke="#4CAF50" stroke-width="1.5"/>
  <text x="300" y="217" text-anchor="middle" font-size="11" fill="#2E7D32">FollowPath</text>

  <!-- === Fallback 第二子节点 === -->
  <rect x="430" y="125" width="160" height="50" rx="10" ry="10" fill="#F3E5F5" stroke="#9C27B0" stroke-width="2"/>
  <text x="510" y="148" text-anchor="middle" font-size="13" font-weight="bold" fill="#6A1B9A">🚨 Sequence (→)</text>
  <text x="510" y="166" text-anchor="middle" font-size="10" fill="#7B1FA2">失败恢复流程</text>

  <line x1="510" y1="175" x2="510" y2="190" stroke="#9C27B0" stroke-width="1.5"/>
  <line x1="460" y1="190" x2="560" y2="190" stroke="#9C27B0" stroke-width="1"/>

  <!-- Recovery 子项 -->
  <rect x="430" y="195" width="120" height="35" rx="6" ry="6" fill="#FFF8E1" stroke="#FFD600" stroke-width="1.5"/>
  <text x="490" y="217" text-anchor="middle" font-size="11" fill="#F57F17">Spin (旋转)</text>

  <rect x="490" y="245" width="120" height="35" rx="6" ry="6" fill="#FFF8E1" stroke="#FFD600" stroke-width="1.5"/>
  <text x="550" y="267" text-anchor="middle" font-size="11" fill="#F57F17">BackUp (后退)</text>

  <rect x="410" y="295" width="180" height="35" rx="6" ry="6" fill="#FFF8E1" stroke="#FFD600" stroke-width="1.5"/>
  <text x="500" y="317" text-anchor="middle" font-size="11" fill="#F57F17">Wait (等待)</text>

  <line x1="490" y1="230" x2="550" y2="245" stroke="#9C27B0" stroke-width="1"/>
  <line x1="500" y1="280" x2="500" y2="295" stroke="#9C27B0" stroke-width="1"/>

  <!-- === 底部：成本函数等 === -->
  <rect x="60" y="365" width="600" height="55" rx="10" ry="10" fill="#F5F5F5" stroke="#CCC" stroke-width="1"/>
  <text x="360" y="388" text-anchor="middle" font-size="13" font-weight="bold" fill="#555">行为树控制流节点类型</text>
  <text x="100" y="410" font-size="11" fill="#E91E63">❓ Fallback：子节点可任选一个成功即可</text>
  <text x="400" y="410" font-size="11" fill="#4CAF50">▶️ Sequence：按顺序执行，全部成功才算成功</text>

  <rect x="60" y="435" width="600" height="55" rx="10" ry="10" fill="#FAFAFA" stroke="#EEE" stroke-width="1"/>
  <text x="360" y="455" text-anchor="middle" font-size="12" font-weight="bold" fill="#888">常用条件节点</text>
  <text x="100" y="475" font-size="10" fill="#555">⚪ GoalReached ｜ ⚪ IsStuck ｜ ⚪ TimeExpired ｜ ⚪ BatteryLow</text>
  <text x="100" y="488" font-size="10" fill="#555">⚪ TransformAvailable ｜ ⚪ InitialPoseReceived ｜ ⚪ CostmapUpdated</text>
</svg>
