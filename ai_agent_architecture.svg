<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 620" font-family="'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#555"/>
    </marker>
    <marker id="arrow-blue" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#4A90D9"/>
    </marker>
  </defs>

  <!-- 标题 -->
  <text x="450" y="38" text-anchor="middle" font-size="22" font-weight="bold" fill="#2C3E50">AI Agent 核心架构</text>
  <line x1="200" y1="50" x2="700" y2="50" stroke="#4A90D9" stroke-width="2" opacity="0.5"/>

  <!-- ============ 中心：LLM ============ -->
  <rect x="320" y="230" width="260" height="80" rx="12" ry="12" fill="#4A90D9" stroke="#2A6FA9" stroke-width="2.5"/>
  <text x="450" y="268" text-anchor="middle" font-size="18" font-weight="bold" fill="#fff">大语言模型 (LLM)</text>
  <text x="450" y="292" text-anchor="middle" font-size="13" fill="#E8F0FE">推理 / 规划 / 决策核心</text>

  <!-- ============ 上：用户输入 ============ -->
  <rect x="370" y="75" width="160" height="50" rx="25" ry="25" fill="#E8F4FD" stroke="#4A90D9" stroke-width="2"/>
  <text x="450" y="105" text-anchor="middle" font-size="15" font-weight="bold" fill="#2C3E50">用户输入</text>
  <line x1="450" y1="125" x2="450" y2="230" stroke="#4A90D9" stroke-width="2" stroke-dasharray="6,3" marker-end="url(#arrow-blue)"/>

  <!-- ============ 左：感知层 ============ -->
  <rect x="30" y="200" width="210" height="140" rx="10" ry="10" fill="#F0F4F8" stroke="#8899AA" stroke-width="1.5"/>
  <text x="135" y="228" text-anchor="middle" font-size="14" font-weight="bold" fill="#34495E">🧠 记忆系统 Memory</text>
  <line x1="135" y1="238" x2="135" y2="240" stroke="#8899AA" stroke-width="1"/>
  <rect x="48" y="250" width="175" height="28" rx="6" ry="6" fill="#DCE8F2"/>
  <text x="135" y="269" text-anchor="middle" font-size="12" fill="#34495E">短期记忆 (上下文窗口)</text>
  <rect x="48" y="283" width="175" height="28" rx="6" ry="6" fill="#DCE8F2"/>
  <text x="135" y="302" text-anchor="middle" font-size="12" fill="#34495E">长期记忆 (向量数据库)</text>
  <line x1="240" y1="270" x2="320" y2="270" stroke="#8899AA" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ============ 右：行动层 ============ -->
  <rect x="660" y="200" width="210" height="140" rx="10" ry="10" fill="#F0F4F8" stroke="#8899AA" stroke-width="1.5"/>
  <text x="765" y="228" text-anchor="middle" font-size="14" font-weight="bold" fill="#34495E">🔧 工具调用 Tools</text>
  <line x1="765" y1="238" x2="765" y2="240" stroke="#8899AA" stroke-width="1"/>
  <rect x="678" y="250" width="175" height="28" rx="6" ry="6" fill="#DCE8F2"/>
  <text x="765" y="269" text-anchor="middle" font-size="12" fill="#34495E">函数调用 Function Call</text>
  <rect x="678" y="283" width="175" height="28" rx="6" ry="6" fill="#DCE8F2"/>
  <text x="765" y="302" text-anchor="middle" font-size="12" fill="#34495E">API / 数据库 / 网络</text>
  <line x1="580" y1="270" x2="660" y2="270" stroke="#8899AA" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- 双向箭头 LLM ↔ 记忆 -->
  <line x1="320" y1="250" x2="240" y2="250" stroke="#8899AA" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="240" y1="260" x2="320" y2="260" stroke="#8899AA" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ============ 下左：规划 ============ -->
  <rect x="50" y="410" width="260" height="90" rx="10" ry="10" fill="#FFF8E1" stroke="#E6B800" stroke-width="1.5"/>
  <text x="180" y="440" text-anchor="middle" font-size="14" font-weight="bold" fill="#8B6914">📋 规划能力 Planning</text>
  <line x1="180" y1="450" x2="180" y2="452" stroke="#E6B800" stroke-width="1"/>
  <text x="180" y="472" text-anchor="middle" font-size="12" fill="#6B5522">任务分解 · 思维链 · ReAct 循环</text>
  <line x1="180" y1="500" x2="320" y2="310" stroke="#E6B800" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrow)"/>

  <!-- ============ 下右：输出 ============ -->
  <rect x="590" y="410" width="260" height="90" rx="10" ry="10" fill="#E8F5E9" stroke="#4CAF50" stroke-width="1.5"/>
  <text x="720" y="440" text-anchor="middle" font-size="14" font-weight="bold" fill="#2E7D32">💬 输出 Output</text>
  <line x1="720" y1="450" x2="720" y2="452" stroke="#4CAF50" stroke-width="1"/>
  <text x="720" y="472" text-anchor="middle" font-size="12" fill="#388E3C">文本生成 · 工具结果整合 · 对话</text>
  <line x1="580" y1="310" x2="590" y2="455" stroke="#4CAF50" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrow)"/>

  <!-- ============ 底部：反馈循环 ============ -->
  <path d="M 720 500 L 720 555 Q 720 575 700 575 L 200 575 Q 180 575 180 555 L 180 500" fill="none" stroke="#FF7043" stroke-width="1.8" stroke-dasharray="8,4" marker-end="url(#arrow)"/>
  <text x="450" y="568" text-anchor="middle" font-size="12" fill="#FF7043">🔄 反馈循环 —— 持续学习与优化</text>

  <!-- 图例 -->
  <rect x="20" y="590" width="12" height="12" rx="2" fill="#4A90D9"/>
  <text x="38" y="601" font-size="11" fill="#666">核心引擎</text>
  <rect x="120" y="590" width="12" height="12" rx="2" fill="#F0F4F8" stroke="#8899AA" stroke-width="1"/>
  <text x="138" y="601" font-size="11" fill="#666">外围模块</text>
  <line x1="230" y1="594" x2="260" y2="594" stroke="#FF7043" stroke-width="1.8" stroke-dasharray="6,3"/>
  <text x="268" y="601" font-size="11" fill="#666">反馈循环</text>
</svg>
