<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 530" font-family="'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#555"/>
    </marker>
    <marker id="arrow-pub" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#E65100"/>
    </marker>
    <marker id="arrow-sub" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1565C0"/>
    </marker>
  </defs>
  <text x="410" y="35" text-anchor="middle" font-size="20" font-weight="bold" fill="#2C3E50">ROS2 通信模型</text>
  <line x1="200" y1="45" x2="620" y2="45" stroke="#E91E63" stroke-width="2" opacity="0.4"/>

  <!-- === Topic 通信 === -->
  <text x="410" y="80" text-anchor="middle" font-size="15" font-weight="bold" fill="#E65100">① Topic —— 异步发布/订阅</text>

  <rect x="60" y="95" width="200" height="60" rx="10" ry="10" fill="#FFF3E0" stroke="#FF9800" stroke-width="2"/>
  <text x="160" y="120" text-anchor="middle" font-size="14" font-weight="bold" fill="#E65100">📤 Publisher</text>
  <text x="160" y="142" text-anchor="middle" font-size="11" fill="#6D4C41">发布者节点</text>

  <rect x="560" y="95" width="200" height="60" rx="10" ry="10" fill="#E3F2FD" stroke="#2196F3" stroke-width="2"/>
  <text x="660" y="120" text-anchor="middle" font-size="14" font-weight="bold" fill="#1565C0">📥 Subscriber</text>
  <text x="660" y="142" text-anchor="middle" font-size="11" fill="#37474F">订阅者节点</text>

  <rect x="320" y="100" width="180" height="50" rx="25" ry="25" fill="#F5F5F5" stroke="#999" stroke-width="2" stroke-dasharray="6,3"/>
  <text x="410" y="122" text-anchor="middle" font-size="13" font-weight="bold" fill="#555">📢 /topic_name</text>
  <text x="410" y="140" text-anchor="middle" font-size="10" fill="#888">消息类型：std_msgs/String</text>
  <line x1="260" y1="125" x2="310" y2="125" stroke="#FF9800" stroke-width="2" marker-end="url(#arrow-pub)"/>
  <line x1="500" y1="125" x2="555" y2="125" stroke="#2196F3" stroke-width="2" marker-end="url(#arrow-sub)"/>

  <text x="410" y="165" text-anchor="middle" font-size="10" fill="#999">特点：多对多、异步、匿名、解耦</text>

  <!-- === Service 通信 === -->
  <text x="410" y="210" text-anchor="middle" font-size="15" font-weight="bold" fill="#4CAF50">② Service —— 同步请求/响应</text>

  <rect x="60" y="225" width="200" height="60" rx="10" ry="10" fill="#E8F5E9" stroke="#4CAF50" stroke-width="2"/>
  <text x="160" y="250" text-anchor="middle" font-size="14" font-weight="bold" fill="#2E7D32">📞 Client</text>
  <text x="160" y="272" text-anchor="middle" font-size="11" fill="#388E3C">客户端（请求方）</text>

  <rect x="560" y="225" width="200" height="60" rx="10" ry="10" fill="#E8F5E9" stroke="#4CAF50" stroke-width="2"/>
  <text x="660" y="250" text-anchor="middle" font-size="14" font-weight="bold" fill="#2E7D32">🤖 Server</text>
  <text x="660" y="272" text-anchor="middle" font-size="11" fill="#388E3C">服务端（响应方）</text>

  <path d="M 260 244 L 320 244 L 320 244 L 380 244" fill="none" stroke="#4CAF50" stroke-width="1.8" marker-end="url(#arrow)"/>
  <text x="325" y="237" font-size="10" fill="#2E7D32">请求</text>
  <path d="M 555 266 L 495 266 L 495 266 L 435 266" fill="none" stroke="#4CAF50" stroke-width="1.8" marker-end="url(#arrow)"/>
  <text x="498" y="281" font-size="10" fill="#2E7D32">响应</text>

  <text x="410" y="298" text-anchor="middle" font-size="10" fill="#999">特点：一对一、同步、有严格超时</text>

  <!-- === Action 通信 === -->
  <text x="410" y="340" text-anchor="middle" font-size="15" font-weight="bold" fill="#9C27B0">③ Action —— 异步任务 + 反馈</text>

  <rect x="60" y="355" width="200" height="60" rx="10" ry="10" fill="#F3E5F5" stroke="#9C27B0" stroke-width="2"/>
  <text x="160" y="380" text-anchor="middle" font-size="14" font-weight="bold" fill="#6A1B9A">🎯 Action Client</text>
  <text x="160" y="402" text-anchor="middle" font-size="11" fill="#7B1FA2">发起动作任务</text>

  <rect x="560" y="355" width="200" height="60" rx="10" ry="10" fill="#F3E5F5" stroke="#9C27B0" stroke-width="2"/>
  <text x="660" y="380" text-anchor="middle" font-size="14" font-weight="bold" fill="#6A1B9A">⚙️ Action Server</text>
  <text x="660" y="402" text-anchor="middle" font-size="11" fill="#7B1FA2">执行动作任务</text>

  <path d="M 260 366 L 310 366 L 310 375 L 360 375" fill="none" stroke="#9C27B0" stroke-width="1.8" marker-end="url(#arrow)"/>
  <text x="310" y="358" font-size="10" fill="#6A1B9A">Goal</text>
  <path d="M 555 396 L 460 396" fill="none" stroke="#9C27B0" stroke-width="1.8" marker-end="url(#arrow)"/>
  <text x="510" y="390" font-size="10" fill="#6A1B9A">Result + Feedback</text>

  <text x="410" y="428" text-anchor="middle" font-size="10" fill="#999">特点：可取消、有中间反馈、适合长任务（导航、机械臂）</text>

  <!-- 对比表格 -->
  <rect x="40" y="440" width="740" height="80" rx="10" ry="10" fill="#FAFAFA" stroke="#DDD" stroke-width="1"/>
  <text x="410" y="462" text-anchor="middle" font-size="13" font-weight="bold" fill="#555">三种通信方式对比</text>
  <line x1="60" y1="470" x2="760" y2="470" stroke="#DDD" stroke-width="1"/>
  <text x="130" y="488" font-size="11" font-weight="bold" fill="#555">类型</text>
  <text x="250" y="488" font-size="11" font-weight="bold" fill="#555">模式</text>
  <text x="370" y="488" font-size="11" font-weight="bold" fill="#555">关系</text>
  <text x="490" y="488" font-size="11" font-weight="bold" fill="#555">超时</text>
  <text x="610" y="488" font-size="11" font-weight="bold" fill="#555">适用场景</text>
  <line x1="60" y1="493" x2="760" y2="493" stroke="#DDD" stroke-width="1"/>
  <text x="130" y="510" font-size="10" fill="#E65100">Topic</text>
  <text x="250" y="510" font-size="10" fill="#555">异步</text>
  <text x="370" y="510" font-size="10" fill="#555">多对多</text>
  <text x="490" y="510" font-size="10" fill="#555">无</text>
  <text x="610" y="510" font-size="10" fill="#555">传感器、状态</text>
  <text x="130" y="520" font-size="10" fill="#2E7D32">Service</text>
  <text x="250" y="520" font-size="10" fill="#555">同步</text>
  <text x="370" y="520" font-size="10" fill="#555">一对一</text>
  <text x="490" y="520" font-size="10" fill="#555">有</text>
  <text x="610" y="520" font-size="10" fill="#555">查询、配置</text>
  <text x="130" y="530" font-size="10" fill="#6A1B9A">Action</text>
  <text x="250" y="530" font-size="10" fill="#555">异步+反馈</text>
  <text x="370" y="530" font-size="10" fill="#555">一对一</text>
  <text x="490" y="530" font-size="10" fill="#555">有</text>
  <text x="610" y="530" font-size="10" fill="#555">长任务</text>
</svg>
