<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 620" font-family="'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#555"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#43A047"/>
    </marker>
    <marker id="arrow-purple" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#7B1FA2"/>
    </marker>
  </defs>

  <!-- 标题 -->
  <text x="450" y="38" text-anchor="middle" font-size="22" font-weight="bold" fill="#2C3E50">MCP 协议架构 (Model Context Protocol)</text>
  <line x1="150" y1="50" x2="750" y2="50" stroke="#7B1FA2" stroke-width="2" opacity="0.5"/>

  <!-- ============ 层1：Host ============ -->
  <rect x="220" y="75" width="460" height="60" rx="10" ry="10" fill="#EDE7F6" stroke="#7B1FA2" stroke-width="2"/>
  <text x="450" y="100" text-anchor="middle" font-size="16" font-weight="bold" fill="#4A148C">Host 主机层</text>
  <text x="450" y="122" text-anchor="middle" font-size="12" fill="#6A1B9A">AI 应用 / IDE / 聊天界面 — 发起会话的载体</text>

  <!-- 箭头 Host → Client -->
  <line x1="450" y1="135" x2="450" y2="178" stroke="#7B1FA2" stroke-width="2" marker-end="url(#arrow-purple)"/>

  <!-- ============ 层2：Client ============ -->
  <rect x="220" y="180" width="460" height="60" rx="10" ry="10" fill="#F3E5F5" stroke="#9C27B0" stroke-width="2"/>
  <text x="450" y="205" text-anchor="middle" font-size="16" font-weight="bold" fill="#6A1B9A">MCP Client 客户端</text>
  <text x="450" y="227" text-anchor="middle" font-size="12" fill="#7B1FA2">与 MCP 服务器建立 1:1 连接</text>

  <!-- 箭头 Client → Server -->
  <line x1="450" y1="240" x2="450" y2="283" stroke="#9C27B0" stroke-width="2" marker-end="url(#arrow-purple)"/>

  <!-- ============ 层3：Server ============ -->
  <rect x="220" y="285" width="460" height="60" rx="10" ry="10" fill="#E8F5E9" stroke="#43A047" stroke-width="2"/>
  <text x="450" y="310" text-anchor="middle" font-size="16" font-weight="bold" fill="#2E7D32">MCP Server 服务器</text>
  <text x="450" y="332" text-anchor="middle" font-size="12" fill="#388E3C">暴露资源、工具、提示词的轻量级服务器</text>

  <!-- 箭头到各服务 -->
  <line x1="300" y1="345" x2="300" y2="400" stroke="#43A047" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <line x1="450" y1="345" x2="450" y2="400" stroke="#43A047" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <line x1="600" y1="345" x2="600" y2="400" stroke="#43A047" stroke-width="1.5" marker-end="url(#arrow-green)"/>

  <!-- ============ 层4：服务/资源 ============ -->

  <!-- 资源 -->
  <rect x="135" y="405" width="210" height="90" rx="10" ry="10" fill="#FFF3E0" stroke="#FF9800" stroke-width="1.5"/>
  <text x="240" y="433" text-anchor="middle" font-size="14" font-weight="bold" fill="#E65100">📂 Resources</text>
  <text x="240" y="453" text-anchor="middle" font-size="11" fill="#6D4C41">暴露文件/数据</text>
  <text x="240" y="469" text-anchor="middle" font-size="11" fill="#6D4C41">类似 GET 请求</text>
  <text x="240" y="485" text-anchor="middle" font-size="11" fill="#6D4C41">支持订阅推送</text>

  <!-- 工具 -->
  <rect x="345" y="405" width="210" height="90" rx="10" ry="10" fill="#E3F2FD" stroke="#2196F3" stroke-width="1.5"/>
  <text x="450" y="433" text-anchor="middle" font-size="14" font-weight="bold" fill="#1565C0">🔧 Tools</text>
  <text x="450" y="453" text-anchor="middle" font-size="11" fill="#37474F">可执行操作</text>
  <text x="450" y="469" text-anchor="middle" font-size="11" fill="#37474F">类似 POST 请求</text>
  <text x="450" y="485" text-anchor="middle" font-size="11" fill="#37474F">由 LLM 按需调用</text>

  <!-- 提示词 -->
  <rect x="555" y="405" width="210" height="90" rx="10" ry="10" fill="#FCE4EC" stroke="#E91E63" stroke-width="1.5"/>
  <text x="660" y="433" text-anchor="middle" font-size="14" font-weight="bold" fill="#C62828">📝 Prompts</text>
  <text x="660" y="453" text-anchor="middle" font-size="11" fill="#4A148C">预制提示模板</text>
  <text x="660" y="469" text-anchor="middle" font-size="11" fill="#4A148C">标准化交互</text>
  <text x="660" y="485" text-anchor="middle" font-size="11" fill="#4A148C">由用户/LLM 触发</text>

  <!-- ============ 底部：传输层 ============ -->
  <rect x="250" y="530" width="400" height="55" rx="10" ry="10" fill="#ECEFF1" stroke="#607D8B" stroke-width="1.5"/>
  <text x="450" y="555" text-anchor="middle" font-size="14" font-weight="bold" fill="#37474F">🔌 传输层 Transport</text>
  <text x="450" y="575" text-anchor="middle" font-size="12" fill="#546E7A">stdio（子进程通信）| SSE（HTTP 服务端推送）</text>

  <!-- 箭头 Resources/Tools/Prompts → Transport -->
  <line x1="240" y1="495" x2="350" y2="530" stroke="#607D8B" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="450" y1="495" x2="450" y2="530" stroke="#607D8B" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="660" y1="495" x2="550" y2="530" stroke="#607D8B" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- 图例 -->
  <text x="20" y="610" font-size="11" fill="#999">注意：Client ↔ Server 是 1:1 关系，一个 Host 可连接多个 Server</text>
</svg>
